services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: synapse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapse
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: synapse-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/synapse123
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "synapse123", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: synapse-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  qdrant-init:
    build: ./backend
    container_name: synapse-qdrant-init
    depends_on:
      qdrant:
        condition: service_started
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=articles
    command: ["python", "init_qdrant.py"]
    restart: "no"

  backend:
    build: ./backend
    container_name: synapse-backend
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant-init:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=postgresql+asyncpg://synapse:synapse@postgres:5432/synapse
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=synapse123
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=articles
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
    command:
      - sh
      - -c
      - >-
        python -m pip show qdrant-client > /dev/null 2>&1 || python -m pip install --no-cache-dir "qdrant-client>=1.8,<2";
        uvicorn app.main:app --host 0.0.0.0 --port 5000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: synapse-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    restart: unless-stopped

volumes:
  postgres-data:
  neo4j-data:
  qdrant-data:
