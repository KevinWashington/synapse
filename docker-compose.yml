services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: synapse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapse
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U synapse" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: synapse-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/synapse123
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "synapse123", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: synapse-backend
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://synapse:synapse@postgres:5432/synapse
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=synapse123
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app # Hot-reload para backend Python
    restart: unless-stopped

volumes:
  postgres-data:
  neo4j-data:
