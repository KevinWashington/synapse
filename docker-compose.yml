services:
  postgres:
    image: postgres:16-alpine
    container_name: synapse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapse
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U synapse" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./entrypoint-ollama.sh:/entrypoint-ollama.sh
    entrypoint: /entrypoint-ollama.sh
    restart: unless-stopped
    profiles:
      - ollama

  backend:
    build: ./synapse-backend
    container_name: synapse-backend
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://synapse:synapse@postgres:5432/synapse
    env_file:
      - ./synapse-backend/.env
    restart: unless-stopped

  frontend:
    build: ./synapse
    container_name: synapse-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  ollama-data:
