services:
  postgres:
    image: postgres:16-alpine
    container_name: synapse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapse
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U synapse" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./synapse-backend
    container_name: synapse-backend
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://synapse:synapse@postgres:5432/synapse
    env_file:
      - ./synapse-backend/.env
    volumes:
      - ./synapse-backend/app:/app/app # Hot-reload para backend Python
    restart: unless-stopped

volumes:
  postgres-data:
